name: Deploy Mobile Client

on:
  push:
    branches:
      - main
    paths:
      - public/**
      - wrangler.toml
      - package.json
      - package-lock.json
      - .github/workflows/cloudflare-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://moboard.pages.dev/mobile.html
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=moboard --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
