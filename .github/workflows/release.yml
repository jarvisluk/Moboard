name: Release Desktop App

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            script: dist:mac
            artifact: macos-release-assets
          - name: Windows x64
            os: windows-latest
            script: dist:win
            artifact: windows-release-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript
        run: npm test

      - name: Build desktop app
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          mapfile -d '' assets < <(find release-assets -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.blockmap' -o -name 'latest*.yml' \) -print0 | sort -z)
          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found." >&2
            exit 1
          fi
          args=(
            release create "$tag" "${assets[@]}"
            --title "Moboard $tag"
            --generate-notes
            --target "$GITHUB_SHA"
          )
          previous_tag="$(git tag --sort=-creatordate | grep -v "^${tag}$" | head -n 1 || true)"
          if [[ -n "$previous_tag" ]]; then
            args+=(--notes-start-tag "$previous_tag")
          fi
          gh "${args[@]}"
